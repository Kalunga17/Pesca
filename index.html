<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tradutor de Vídeos</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

input{
width:80%;
padding:10px;
font-size:16px;
margin:10px;
}

button{
padding:10px 20px;
font-size:16px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
}

iframe{
margin-top:20px;
width:90%;
height:400px;
}

#sub{
margin-top:20px;
background:#222;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<h1>🎬 Tradutor de Vídeos</h1>

<input id="url" placeholder="Cole o link do vídeo">

<br>

<button onclick="loadVideo()">Traduzir</button>

<div id="video"></div>

<div id="sub">Legenda traduzida aparecerá aqui</div>

<script>

function loadVideo(){

let url=document.getElementById("url").value

let id=url.split("v=")[1]

document.getElementById("video").innerHTML=
`<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`

getSubtitle(id)

}

async function getSubtitle(id){

try{

let r=await fetch(
"https://youtubetranscript.com/?server_vid2="+id
)

let data=await r.json()

let text=data.transcript.map(x=>x.text).join(" ")

translate(text)

}

catch{

document.getElementById("sub").innerHTML=
"Não foi possível pegar legenda"

}

}

async function translate(text){

let r=await fetch(
"https://api.mymemory.translated.net/get?q="+
encodeURIComponent(text)+
"&langpair=auto|pt"
)

let data=await r.json()

document.getElementById("sub").innerHTML=
data.responseData.translatedText

}

</script>

</body>
</html>
