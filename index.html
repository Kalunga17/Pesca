<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA Pesca Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#061825;
color:white;
text-align:center;
}

header{
background:#0c3b5e;
padding:20px;
font-size:26px;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

.card{
background:#103d5c;
margin:10px 0;
padding:15px;
border-radius:10px;
}

#map{
height:300px;
border-radius:10px;
}

.species{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.sp{
background:#0f2f47;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
🎣 IA Previsão de Pesca Pro
</header>

<div class="container">

<div class="card">
<h3>📍 Localização</h3>
<p id="loc"></p>
</div>

<div class="card">
<h3>🗺 Mapa de pesca</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>🌤 Clima</h3>
<p id="weather"></p>
</div>

<div class="card">
<h3>🌡 Pressão atmosférica</h3>
<p id="pressure"></p>
</div>

<div class="card">
<h3>🌅 Sol</h3>
<p id="sun"></p>
</div>

<div class="card">
<h3>🤖 IA atividade por peixe</h3>

<div class="species">

<div class="sp">Tilápia<br><span id="tilapia"></span></div>

<div class="sp">Pacu<br><span id="pacu"></span></div>

<div class="sp">Piau<br><span id="piau"></span></div>

<div class="sp">Matrinxã<br><span id="matrinxa"></span></div>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

document.getElementById("loc").innerHTML=
lat.toFixed(3)+" , "+lon.toFixed(3)

createMap(lat,lon)

getWeather(lat,lon)

getSun(lat,lon)

})

function createMap(lat,lon){

map=L.map("map").setView([lat,lon],13)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map)

L.marker([lat,lon]).addTo(map)
.bindPopup("Seu local 🎣")

L.marker([lat+0.02,lon]).addTo(map)
.bindPopup("Estrutura boa")

L.marker([lat-0.015,lon+0.01]).addTo(map)
.bindPopup("Galhadas")

}

function getWeather(lat,lon){

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
.then(r=>r.json())
.then(data=>{

let t=data.current_weather.temperature
let w=data.current_weather.windspeed

document.getElementById("weather").innerHTML=
`${t}°C | vento ${w} km/h`

let pressure=data.current_weather.surface_pressure || 1013

document.getElementById("pressure").innerHTML=
pressure+" hPa"

fishAI(t,w,pressure)

})

}

function getSun(lat,lon){

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=sunrise,sunset&timezone=auto`)
.then(r=>r.json())
.then(data=>{

let sr=new Date(data.daily.sunrise[0])
let ss=new Date(data.daily.sunset[0])

document.getElementById("sun").innerHTML=
"Nascer "+sr.getHours()+":"+sr.getMinutes()+"<br>Pôr "+ss.getHours()+":"+ss.getMinutes()

})

}

function fishAI(temp,wind,pressure){

function score(){

let s=50

if(temp>22 && temp<30) s+=20

if(wind<10) s+=10

if(pressure>1010 && pressure<1025) s+=15

return s

}

let base=score()

document.getElementById("tilapia").innerHTML=level(base+5)

document.getElementById("pacu").innerHTML=level(base)

document.getElementById("piau").innerHTML=level(base+3)

document.getElementById("matrinxa").innerHTML=level(base-5)

}

function level(s){

if(s>80) return "🔥 Muito alta"

if(s>65) return "🟢 Alta"

if(s>50) return "🟡 Média"

if(s>35) return "🟠 Baixa"

return "🔴 Fraca"

}

</script>

</body>
</html>
